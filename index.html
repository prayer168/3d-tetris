<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>俄羅斯方塊</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    gap: 24px;
  }
  #board {
    border: 2px solid #334;
    background: #0d0d1a;
    display: block;
    box-shadow: 0 0 40px rgba(80,80,255,0.3);
  }
  #side-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 140px;
  }
  .panel-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid #334;
    border-radius: 10px;
    padding: 14px 16px;
  }
  .panel-box h3 {
    font-size: 0.65rem;
    color: #667;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .panel-box .val {
    font-size: 1.7rem;
    font-weight: bold;
    color: #88aaff;
  }
  #next-canvas {
    display: block;
    margin: 6px auto 0;
  }
  .keys {
    font-size: 0.72rem;
    color: #99a;
    line-height: 1.9;
  }
  .keys b {
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: monospace;
    color: #ccd;
    font-weight: normal;
  }
  #btn-start {
    background: linear-gradient(135deg, #4466ff, #6644ff);
    border: none;
    border-radius: 8px;
    color: #fff;
    padding: 11px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: bold;
    letter-spacing: 1px;
    width: 100%;
    transition: opacity 0.2s;
  }
  #btn-start:hover { opacity: 0.85; }
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,10,0.78);
    backdrop-filter: blur(5px);
    z-index: 10;
    gap: 12px;
  }
  #overlay h2 { font-size: 2.4rem; color: #88aaff; text-shadow: 0 0 30px #4466ff; }
  #overlay p  { color: #aab; font-size: 0.95rem; }
  #overlay button {
    background: linear-gradient(135deg, #4466ff, #6644ff);
    border: none; border-radius: 10px; color: #fff;
    padding: 13px 44px; cursor: pointer;
    font-size: 1.1rem; font-weight: bold; letter-spacing: 2px;
    box-shadow: 0 0 30px rgba(100,100,255,0.4);
    transition: transform 0.1s; margin-top: 8px;
  }
  #overlay button:hover { transform: scale(1.05); }
</style>
</head>
<body>

<canvas id="board"></canvas>

<div id="side-panel">
  <div class="panel-box">
    <h3>分數</h3>
    <div class="val" id="score">0</div>
  </div>
  <div class="panel-box">
    <h3>等級</h3>
    <div class="val" id="level" style="color:#ffaa44">1</div>
  </div>
  <div class="panel-box">
    <h3>消行</h3>
    <div class="val" id="lines" style="color:#44ffaa">0</div>
  </div>
  <div class="panel-box">
    <h3>下一個</h3>
    <canvas id="next-canvas" width="100" height="80"></canvas>
  </div>
  <button id="btn-start">重新開始</button>
  <div class="panel-box">
    <div class="keys">
      <b>← →</b> 左右移<br>
      <b>↑</b> 旋轉<br>
      <b>↓</b> 加速落下<br>
      <b>Space</b> 直接落底<br>
      <b>P</b> 暫停
    </div>
  </div>
</div>

<div id="overlay">
  <h2>俄羅斯方塊</h2>
  <p>清除整行得分，越高層越快！</p>
  <button id="overlay-btn">開始遊戲</button>
</div>

<script>
const COLS = 10, ROWS = 20, CELL = 32;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;

const nextCanvas = document.getElementById('next-canvas');
const nCtx = nextCanvas.getContext('2d');

// Piece definitions [shape, color]
const PIECES = [
  { shape: [[1,1,1,1]],                         color: '#00eeff' }, // I
  { shape: [[1,1],[1,1]],                        color: '#ffee00' }, // O
  { shape: [[0,1,0],[1,1,1]],                    color: '#cc44ff' }, // T
  { shape: [[1,0],[1,0],[1,1]],                  color: '#ff8800' }, // L
  { shape: [[0,1],[0,1],[1,1]],                  color: '#4488ff' }, // J
  { shape: [[0,1,1],[1,1,0]],                    color: '#44ff88' }, // S
  { shape: [[1,1,0],[0,1,1]],                    color: '#ff4466' }, // Z
];

// ── State ──────────────────────────────────────────────────────────────────
let board, current, next, score, level, lines, gameOver, paused, started;
let dropInterval, lastDrop;

function initState() {
  board = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
  score = 0; level = 1; lines = 0;
  dropInterval = 800; lastDrop = performance.now();
  gameOver = false; paused = false; started = true;
  next = randomPiece();
  spawnPiece();
  updateUI();
}

// ── Piece helpers ───────────────────────────────────────────────────────────
function randomPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  return { shape: p.shape.map(r => [...r]), color: p.color };
}

function spawnPiece() {
  current = next;
  next = randomPiece();
  current.x = Math.floor((COLS - current.shape[0].length) / 2);
  current.y = 0;
  if (!valid(current.shape, current.x, current.y)) endGame();
  drawNext();
}

function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  return Array.from({ length: cols }, (_, c) =>
    Array.from({ length: rows }, (_, r) => shape[rows - 1 - r][c])
  );
}

function valid(shape, ox, oy) {
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c]) {
        const nx = ox + c, ny = oy + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && board[ny][nx]) return false;
      }
  return true;
}

// ── Ghost ───────────────────────────────────────────────────────────────────
function ghostY() {
  let gy = current.y;
  while (valid(current.shape, current.x, gy + 1)) gy++;
  return gy;
}

// ── Lock & clear ─────────────────────────────────────────────────────────────
function lock() {
  const { shape, x, y, color } = current;
  shape.forEach((row, r) =>
    row.forEach((v, c) => { if (v && y + r >= 0) board[y + r][x + c] = color; })
  );
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c)) {
      board.splice(r, 1);
      board.unshift(new Array(COLS).fill(null));
      cleared++; r++;
    }
  }
  if (cleared) {
    const pts = [0, 100, 300, 600, 1000][Math.min(cleared, 4)] * level;
    score += pts;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(80, 800 - (level - 1) * 72);
  }
  updateUI();
  spawnPiece();
}

function hardDrop() {
  current.y = ghostY();
  lock();
}

// ── Draw ─────────────────────────────────────────────────────────────────────
function drawCell(ctx, x, y, color, alpha = 1, cellSize = CELL) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(x * cellSize + 1, y * cellSize + 1, cellSize - 2, cellSize - 2);
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(x * cellSize + 1, y * cellSize + 1, cellSize - 2, 5);
  ctx.fillRect(x * cellSize + 1, y * cellSize + 1, 5, cellSize - 2);
  // Shadow edge
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(x * cellSize + 1, y * cellSize + cellSize - 5, cellSize - 2, 4);
  ctx.globalAlpha = 1;
}

function draw(now) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.strokeRect(c * CELL, r * CELL, CELL, CELL);
    }
  }

  // Board cells
  board.forEach((row, r) =>
    row.forEach((color, c) => { if (color) drawCell(ctx, c, r, color); })
  );

  if (current) {
    // Ghost
    const gy = ghostY();
    current.shape.forEach((row, r) =>
      row.forEach((v, c) => {
        if (v) drawCell(ctx, current.x + c, gy + r, current.color, 0.18);
      })
    );
    // Current piece
    current.shape.forEach((row, r) =>
      row.forEach((v, c) => {
        if (v) drawCell(ctx, current.x + c, current.y + r, current.color);
      })
    );
  }

  // Paused overlay
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,10,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#88aaff';
    ctx.font = 'bold 28px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('暫停', canvas.width / 2, canvas.height / 2);
  }
}

function drawNext() {
  nCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  const cs = 20;
  const shape = next.shape;
  const offX = Math.floor((nextCanvas.width  - shape[0].length * cs) / 2) / cs;
  const offY = Math.floor((nextCanvas.height - shape.length    * cs) / 2) / cs;
  shape.forEach((row, r) =>
    row.forEach((v, c) => { if (v) drawCell(nCtx, offX + c, offY + r, next.color, 1, cs); })
  );
}

// ── UI ────────────────────────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;
}

function showOverlay(title, sub, btn) {
  const ov = document.getElementById('overlay');
  ov.querySelector('h2').textContent = title;
  ov.querySelector('p').textContent  = sub;
  ov.querySelector('button').textContent = btn;
  ov.style.display = 'flex';
}

function hideOverlay() { document.getElementById('overlay').style.display = 'none'; }

function endGame() {
  gameOver = true;
  showOverlay('遊戲結束', `最終分數：${score.toLocaleString()}`, '再玩一次');
}

// ── Input ─────────────────────────────────────────────────────────────────────
const keyRepeat = {};
const KEY_DELAY = 150, KEY_RPT = 70;

window.addEventListener('keydown', e => {
  if (!started) return;
  if (e.code === 'KeyP') { if (!gameOver) paused = !paused; return; }
  if (paused || gameOver) return;

  switch (e.code) {
    case 'ArrowLeft':
      doMove(() => { if (valid(current.shape, current.x - 1, current.y)) { current.x--; return true; } });
      break;
    case 'ArrowRight':
      doMove(() => { if (valid(current.shape, current.x + 1, current.y)) { current.x++; return true; } });
      break;
    case 'ArrowUp': {
      const rot = rotate(current.shape);
      const kicks = [0, -1, 1, -2, 2];
      for (const k of kicks) {
        if (valid(rot, current.x + k, current.y)) { current.shape = rot; current.x += k; break; }
      }
      break;
    }
    case 'ArrowDown':
      doMove(() => { if (valid(current.shape, current.x, current.y + 1)) { current.y++; return true; } });
      e.preventDefault();
      break;
    case 'Space': hardDrop(); e.preventDefault(); break;
  }

  function doMove(fn) {
    fn();
    if (!keyRepeat[e.code]) {
      keyRepeat[e.code] = setTimeout(function repeat() {
        if (!paused && !gameOver) fn();
        keyRepeat[e.code] = setTimeout(repeat, KEY_RPT);
      }, KEY_DELAY);
    }
  }
});

window.addEventListener('keyup', e => {
  if (keyRepeat[e.code]) { clearTimeout(keyRepeat[e.code]); delete keyRepeat[e.code]; }
});

// ── Game loop ─────────────────────────────────────────────────────────────────
function loop(now) {
  requestAnimationFrame(loop);
  if (started && !gameOver && !paused) {
    if (now - lastDrop >= dropInterval) {
      lastDrop = now;
      if (valid(current.shape, current.x, current.y + 1)) current.y++;
      else lock();
    }
  }
  if (started) draw(now);
}
requestAnimationFrame(loop);

// ── Buttons ───────────────────────────────────────────────────────────────────
function startGame() { hideOverlay(); initState(); }
document.getElementById('overlay-btn').addEventListener('click', startGame);
document.getElementById('btn-start').addEventListener('click', startGame);
</script>
</body>
</html>
