<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q版俄羅斯方塊 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0e0820;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
    color: #fff; gap: 24px; overflow: hidden;
  }
  #board-wrap {
    position: relative; border-radius: 20px; overflow: hidden;
    box-shadow: 0 0 0 3px rgba(200,140,255,0.35),
                0 0 60px rgba(160,80,255,0.55),
                0 0 120px rgba(80,120,255,0.2);
  }
  #board { display: block; }
  #side { display: flex; flex-direction: column; gap: 12px; width: 148px; }
  .box {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px; padding: 12px 14px;
  }
  .box h3 { font-size: 0.58rem; color: rgba(255,255,255,0.42); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
  .val { font-size: 1.7rem; font-weight: 900; }
  #score-val { color: #ffe055; }
  #level-val { color: #ff88dd; }
  #lines-val { color: #55ffcc; }
  #next-canvas { display:block; margin: 6px auto 0; background: rgba(0,0,0,0.3); border-radius: 8px; }
  #btn-start {
    background: linear-gradient(135deg, #ff55aa, #9933ff);
    border: none; border-radius: 14px; color: #fff;
    padding: 12px; cursor: pointer; font-size: 0.88rem;
    font-weight: 900; font-family: inherit; letter-spacing: 1px;
    box-shadow: 0 4px 22px rgba(200,60,200,0.5);
    transition: transform 0.12s, box-shadow 0.12s; width: 100%;
  }
  #btn-start:hover { transform: scale(1.04); box-shadow: 0 6px 28px rgba(200,60,200,0.7); }
  #btn-start:active { transform: scale(0.96); }
  .keys { font-size: 0.67rem; color: rgba(255,255,255,0.52); line-height: 1.95; }
  .keys kbd { background: rgba(255,255,255,0.14); border-radius: 4px; padding: 1px 5px; font-family: monospace; color: #fff; font-size: 0.63rem; }
  #overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(5,0,18,0.86); backdrop-filter: blur(10px);
    z-index: 30; gap: 9px;
  }
  #overlay .emo { font-size: 3rem; line-height: 1; }
  #overlay h2 {
    font-size: 2rem; font-weight: 900;
    background: linear-gradient(135deg,#ff99dd,#bb66ff,#66ccff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  #overlay p { color: rgba(255,255,255,0.6); font-size: 0.88rem; }
  #overlay small { color: rgba(255,255,255,0.35); font-size: 0.75rem; }
  #overlay-btn {
    margin-top: 12px; background: linear-gradient(135deg,#ff55aa,#9933ff);
    border: none; border-radius: 16px; color: #fff;
    padding: 13px 48px; cursor: pointer;
    font-size: 1.05rem; font-weight: 900; font-family: inherit; letter-spacing: 2px;
    box-shadow: 0 6px 30px rgba(200,60,200,0.55);
    transition: transform 0.12s;
  }
  #overlay-btn:hover { transform: scale(1.06); }
</style>
</head>
<body>

<div id="board-wrap">
  <canvas id="board"></canvas>
</div>

<div id="side">
  <div class="box"><h3>✨ 分數</h3><div class="val" id="score-val">0</div></div>
  <div class="box"><h3>⭐ 等級</h3><div class="val" id="level-val">1</div></div>
  <div class="box"><h3>🎯 消行</h3><div class="val" id="lines-val">0</div></div>
  <div class="box">
    <h3>💎 下一個</h3>
    <canvas id="next-canvas" width="116" height="90"></canvas>
  </div>
  <button id="btn-start">🔄 重新開始</button>
  <div class="box">
    <div class="keys">
      <kbd>← →</kbd> 移動<br>
      <kbd>↑</kbd> 旋轉<br>
      <kbd>↓</kbd> 加速<br>
      <kbd>Space</kbd> 落底<br>
      <kbd>P</kbd> 暫停
    </div>
  </div>
</div>

<div id="overlay">
  <div class="emo">🎮</div>
  <h2>Q版俄羅斯方塊</h2>
  <p>消除整行得分，關卡越高越快！</p>
  <small>🎵 內建背景音樂與音效</small>
  <button id="overlay-btn">▶ 開始遊戲</button>
</div>

<script>
'use strict';

// ══════════════════════════════════════════
// Constants
// ══════════════════════════════════════════
const COLS = 10, ROWS = 20, CS = 30;
const W = COLS * CS, H = ROWS * CS;

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const nc = document.getElementById('next-canvas');
const nCtx = nc.getContext('2d');

const PIECES = [
  { shape: [[1,1,1,1]],          color: '#33ccff' }, // I
  { shape: [[1,1],[1,1]],        color: '#ffdd33' }, // O
  { shape: [[0,1,0],[1,1,1]],    color: '#cc44ff' }, // T
  { shape: [[1,0],[1,0],[1,1]],  color: '#ff9933' }, // L
  { shape: [[0,1],[0,1],[1,1]],  color: '#4488ff' }, // J
  { shape: [[0,1,1],[1,1,0]],    color: '#33ffaa' }, // S
  { shape: [[1,1,0],[0,1,1]],    color: '#ff4466' }, // Z
];

// ══════════════════════════════════════════
// Audio Engine
// ══════════════════════════════════════════
let audioCtx = null, masterGain, musicGain, sfxGain;
let musicTimer = null, melodyIdx = 0, melodyTime = 0;

const BPM = 112, BEAT = 60 / BPM;

// Cute C-major pentatonic melody
const MELODY = [
  [523.25,.5],[659.25,.5],[783.99,.5],[880,.5],
  [783.99,.5],[659.25,.5],[523.25,1],
  [440,.5],[523.25,.5],[659.25,.5],[523.25,.5],
  [440,1],[392,1],
  [523.25,.5],[783.99,.5],[659.25,.5],[523.25,.5],
  [440,.5],[523.25,.5],[659.25,.5],[783.99,.5],
  [783.99,1],[659.25,1],
  [523.25,.5],[440,.5],[392,.5],[329.63,.5],
  [261.63,.5],[329.63,.5],[392,.5],[440,.5],
  [523.25,2],
];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.75; masterGain.connect(audioCtx.destination);
  musicGain  = audioCtx.createGain(); musicGain.gain.value  = 0.22; musicGain.connect(masterGain);
  sfxGain    = audioCtx.createGain(); sfxGain.gain.value    = 0.5;  sfxGain.connect(masterGain);
}

function tone(freq, dur, type = 'sine', vol = 0.25, when = 0, dest = null) {
  if (!audioCtx) return;
  const t   = when || audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + Math.max(dur, 0.06));
  osc.connect(g); g.connect(dest || sfxGain);
  osc.start(t); osc.stop(t + dur + 0.06);
}

function scheduleMelody() {
  const AHEAD = 0.15;
  while (melodyTime < audioCtx.currentTime + AHEAD) {
    const [freq, beats] = MELODY[melodyIdx % MELODY.length];
    const dur = beats * BEAT * 0.72;
    tone(freq, dur, 'triangle', 0.16, melodyTime, musicGain);
    // soft bass octave
    if (melodyIdx % 4 === 0)
      tone(freq / 2, beats * BEAT * 0.5, 'sine', 0.06, melodyTime, musicGain);
    melodyTime += beats * BEAT;
    melodyIdx++;
  }
  musicTimer = setTimeout(scheduleMelody, 80);
}

function startMusic() {
  if (!audioCtx) return;
  melodyIdx = 0; melodyTime = audioCtx.currentTime + 0.08;
  scheduleMelody();
}
function stopMusic() { if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; } }

// SFX helpers
const sfxMove     = () => tone(660, 0.04, 'square', 0.06);
const sfxRotate   = () => { tone(500,.04,'square',.08); setTimeout(()=>tone(700,.05,'square',.06),35); };
const sfxSoft     = () => tone(280, 0.07, 'square', 0.1);
const sfxHard     = () => { tone(200,.06,'square',.18); setTimeout(()=>tone(100,.18,'square',.24),50); };
const sfxClear    = n  => [523.25,659.25,783.99,1046.5].slice(0,n+1).forEach((f,i)=>setTimeout(()=>tone(f,.22,'sine',.28),i*55));
const sfxLevelUp  = () => [523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=>setTimeout(()=>tone(f,.15,'sine',.22),i*75));
const sfxGameOver = () => [440,370,311,261.63,196].forEach((f,i)=>setTimeout(()=>tone(f,.35,'sawtooth',.14),i*160));

// ══════════════════════════════════════════
// Particles
// ══════════════════════════════════════════
const particles = [];

function spawnParticles(row, colors) {
  for (let c = 0; c < COLS; c++) {
    const col = colors[c] || '#fff';
    for (let k = 0; k < 4; k++) {
      particles.push({
        x: c * CS + CS / 2, y: row * CS + CS / 2,
        vx: (Math.random() - .5) * 9,
        vy: Math.random() * -11 - 1,
        color: col, alpha: 1,
        decay: .013 + Math.random() * .017,
        size: 4 + Math.random() * 8,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - .5) * .25,
        type: Math.floor(Math.random() * 3), // 0=star 1=circle 2=diamond
      });
    }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += .38; p.vx *= .97;
    p.alpha -= p.decay; p.rot += p.rotV;
    if (p.alpha <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    if (p.type === 0) drawStar5(p.size);
    else if (p.type === 1) { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
    else drawDiamond(p.size);
    ctx.restore();
  });
}

function drawStar5(r) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = (i * Math.PI) / 5 - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.4;
    i === 0 ? ctx.moveTo(rad*Math.cos(a), rad*Math.sin(a))
            : ctx.lineTo(rad*Math.cos(a), rad*Math.sin(a));
  }
  ctx.closePath(); ctx.fill();
}

function drawDiamond(r) {
  ctx.beginPath();
  ctx.moveTo(0,-r); ctx.lineTo(r*.65,0); ctx.lineTo(0,r); ctx.lineTo(-r*.65,0);
  ctx.closePath(); ctx.fill();
}

// ══════════════════════════════════════════
// Background floating bubbles
// ══════════════════════════════════════════
const bubbles = Array.from({length:28}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: 1.5 + Math.random()*2.5,
  alpha: .15 + Math.random()*.3,
  phase: Math.random()*Math.PI*2,
  speed: .015 + Math.random()*.025,
}));

// ══════════════════════════════════════════
// Block drawing
// ══════════════════════════════════════════
function lighten(hex, n) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+n)},${Math.min(255,g+n)},${Math.min(255,b+n)})`;
}
function darken(hex, n) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-n)},${Math.max(0,g-n)},${Math.max(0,b-n)})`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawBlock(c2d, col, row, color, cs = CS, alpha = 1) {
  const x = col*cs+2, y = row*cs+2, w = cs-4, h = cs-4, r = cs*0.22;
  c2d.save();
  c2d.globalAlpha = alpha;

  // Glow
  c2d.shadowColor = color; c2d.shadowBlur = 10;

  // Gradient body
  const g = c2d.createLinearGradient(x, y, x+w, y+h);
  g.addColorStop(0, lighten(color, 55));
  g.addColorStop(.45, color);
  g.addColorStop(1, darken(color, 45));
  c2d.fillStyle = g;
  roundRect(c2d, x, y, w, h, r); c2d.fill();
  c2d.shadowBlur = 0;

  // Top-left shine
  c2d.fillStyle = 'rgba(255,255,255,0.42)';
  roundRect(c2d, x+2, y+2, w*.52, h*.36, r*.6); c2d.fill();

  // Gloss dot
  c2d.fillStyle = 'rgba(255,255,255,0.65)';
  c2d.beginPath(); c2d.arc(x+w*.24, y+h*.27, cs*.07, 0, Math.PI*2); c2d.fill();

  // Border
  c2d.strokeStyle = 'rgba(255,255,255,0.22)'; c2d.lineWidth = 1;
  roundRect(c2d, x, y, w, h, r); c2d.stroke();

  c2d.restore();
}

// ══════════════════════════════════════════
// State
// ══════════════════════════════════════════
let board, current, next;
let score, level, lines;
let gameOver, paused, started;
let dropInterval, lastDrop;
let levelFlash = 0, shakeFrames = 0;
let tick = 0;

// ══════════════════════════════════════════
// Piece logic
// ══════════════════════════════════════════
function randPiece() {
  const p = PIECES[Math.floor(Math.random()*PIECES.length)];
  return { shape: p.shape.map(r=>[...r]), color: p.color };
}

function spawnCurrent() {
  current = { ...next, x: Math.floor((COLS - next.shape[0].length)/2), y: 0 };
  next = randPiece();
  if (!valid(current.shape, current.x, current.y)) endGame();
  drawNext();
}

function rotate90(s) {
  return Array.from({length:s[0].length},(_,c)=>Array.from({length:s.length},(_,r)=>s[s.length-1-r][c]));
}

function valid(shape, ox, oy) {
  for (let r=0;r<shape.length;r++)
    for (let c=0;c<shape[r].length;c++)
      if (shape[r][c]) {
        const nx=ox+c, ny=oy+r;
        if (nx<0||nx>=COLS||ny>=ROWS) return false;
        if (ny>=0 && board[ny][nx]) return false;
      }
  return true;
}

function lock() {
  current.shape.forEach((row,r)=>row.forEach((v,c)=>{
    if (v && current.y+r>=0) board[current.y+r][current.x+c] = current.color;
  }));

  let cleared = 0;
  for (let r=ROWS-1; r>=0; r--) {
    if (board[r].every(c=>c!==null)) {
      spawnParticles(r, board[r]);
      board.splice(r,1); board.unshift(new Array(COLS).fill(null));
      cleared++; r++;
    }
  }

  if (cleared) {
    const prevLv = level;
    score += [0,100,300,600,1000][Math.min(cleared,4)] * level;
    lines += cleared;
    level = Math.floor(lines/10) + 1;
    dropInterval = Math.max(80, 800 - (level-1)*72);
    sfxClear(cleared);
    if (level > prevLv) { sfxLevelUp(); levelFlash = 130; }
  }

  updateUI(); spawnCurrent();
}

function hardDrop() {
  let d = 0;
  while (valid(current.shape, current.x, current.y+1)) { current.y++; d++; }
  score += d*2; shakeFrames = 10; sfxHard();
  updateUI(); lock();
}

// ══════════════════════════════════════════
// Render
// ══════════════════════════════════════════
function drawBackground() {
  // Dark bg
  ctx.fillStyle = '#0d0720'; ctx.fillRect(0,0,W,H);

  // Animated floating bubbles
  tick += 0.016;
  bubbles.forEach(b => {
    const a = b.alpha * (.6 + .4*Math.sin(tick*b.speed*60 + b.phase));
    ctx.globalAlpha = a;
    ctx.fillStyle = '#aaddff';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.028)'; ctx.lineWidth = 1;
  for (let r=0;r<=ROWS;r++) { ctx.beginPath(); ctx.moveTo(0,r*CS); ctx.lineTo(W,r*CS); ctx.stroke(); }
  for (let c=0;c<=COLS;c++) { ctx.beginPath(); ctx.moveTo(c*CS,0); ctx.lineTo(c*CS,H); ctx.stroke(); }
}

function drawBoard() {
  board.forEach((row,r)=>row.forEach((color,c)=>{ if(color) drawBlock(ctx,c,r,color); }));
}

function drawCurrent() {
  if (!current) return;
  current.shape.forEach((row,r)=>row.forEach((v,c)=>{
    if (v) drawBlock(ctx, current.x+c, current.y+r, current.color);
  }));
}

function drawNext() {
  nCtx.fillStyle = 'rgba(0,0,0,0.35)'; nCtx.fillRect(0,0,nc.width,nc.height);
  const cs = 24, shape = next.shape;
  const offX = (nc.width  - shape[0].length*cs) / 2 / cs;
  const offY = (nc.height - shape.length*cs)    / 2 / cs;
  shape.forEach((row,r)=>row.forEach((v,c)=>{ if(v) drawBlock(nCtx, offX+c, offY+r, next.color, cs); }));
}

function drawOverlays() {
  if (levelFlash > 0) {
    ctx.globalAlpha = (levelFlash/130) * 0.32;
    ctx.fillStyle = '#eeccff'; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
    if (levelFlash > 65) {
      ctx.save();
      ctx.globalAlpha = (levelFlash-65)/65;
      ctx.font = "bold 26px 'Nunito', Arial";
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#ff88ff'; ctx.shadowBlur = 22;
      ctx.fillText(`🌟 LEVEL ${level} UP!`, W/2, H/2);
      ctx.restore();
    }
    levelFlash--;
  }
  if (paused) {
    ctx.fillStyle = 'rgba(5,0,18,0.62)'; ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.font = "bold 30px 'Nunito', Arial";
    ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
    ctx.shadowColor = '#aa66ff'; ctx.shadowBlur = 28;
    ctx.fillText('⏸ 暫停中', W/2, H/2);
    ctx.restore();
  }
}

function render() {
  let sx=0, sy=0;
  if (shakeFrames>0) {
    const m = shakeFrames*.8;
    sx=(Math.random()-.5)*m; sy=(Math.random()-.5)*m; shakeFrames--;
  }
  ctx.save(); ctx.translate(sx,sy);
  drawBackground();
  drawBoard();
  drawCurrent();
  updateParticles(); drawParticles();
  drawOverlays();
  ctx.restore();
}

// ══════════════════════════════════════════
// UI
// ══════════════════════════════════════════
function updateUI() {
  document.getElementById('score-val').textContent = score.toLocaleString();
  document.getElementById('level-val').textContent = level;
  document.getElementById('lines-val').textContent = lines;
}

function showOverlay(emoji, title, sub, btn) {
  const ov = document.getElementById('overlay');
  ov.querySelector('.emo').textContent  = emoji;
  ov.querySelector('h2').textContent    = title;
  ov.querySelector('p').textContent     = sub;
  ov.querySelector('button').textContent = btn;
  ov.style.display = 'flex';
}
function hideOverlay() { document.getElementById('overlay').style.display='none'; }

// ══════════════════════════════════════════
// Lifecycle
// ══════════════════════════════════════════
function initState() {
  board = Array.from({length:ROWS},()=>new Array(COLS).fill(null));
  score=0; level=1; lines=0; dropInterval=800; lastDrop=performance.now();
  gameOver=false; paused=false; started=true;
  particles.length=0; levelFlash=0; shakeFrames=0;
  next = randPiece(); spawnCurrent(); updateUI();
}

function startGame() {
  initAudio(); stopMusic(); startMusic();
  initState(); hideOverlay();
}

function endGame() {
  gameOver=true; stopMusic(); sfxGameOver();
  setTimeout(()=>showOverlay('😢','遊戲結束',`最終分數：${score.toLocaleString()}`,'▶ 再玩一次'),1400);
}

// ══════════════════════════════════════════
// Input
// ══════════════════════════════════════════
const held = {};
const DELAY = 145, RPT = 65;

window.addEventListener('keydown', e => {
  if (!started) return;
  if (e.code==='KeyP') { if(!gameOver) paused=!paused; return; }
  if (paused||gameOver) return;

  const repeat = (code, fn) => {
    fn();
    if (!held[code]) held[code] = setTimeout(function go(){
      if (!paused&&!gameOver) fn();
      held[code]=setTimeout(go, RPT);
    }, DELAY);
  };

  switch(e.code) {
    case 'ArrowLeft':
      repeat(e.code, ()=>{ if(valid(current.shape,current.x-1,current.y)){current.x--;sfxMove();} });
      break;
    case 'ArrowRight':
      repeat(e.code, ()=>{ if(valid(current.shape,current.x+1,current.y)){current.x++;sfxMove();} });
      break;
    case 'ArrowUp': {
      const rot=rotate90(current.shape);
      for (const k of [0,-1,1,-2,2])
        if (valid(rot,current.x+k,current.y)){current.shape=rot;current.x+=k;sfxRotate();break;}
      break;
    }
    case 'ArrowDown':
      repeat(e.code, ()=>{
        if(valid(current.shape,current.x,current.y+1)){current.y++;sfxSoft();}
        else lock();
      });
      e.preventDefault(); break;
    case 'Space': hardDrop(); e.preventDefault(); break;
  }
});

window.addEventListener('keyup', e=>{
  if(held[e.code]){clearTimeout(held[e.code]);delete held[e.code];}
});

// ══════════════════════════════════════════
// Game loop
// ══════════════════════════════════════════
function loop(now) {
  requestAnimationFrame(loop);
  if (started&&!gameOver&&!paused) {
    if (now-lastDrop>=dropInterval) {
      lastDrop=now;
      if(valid(current.shape,current.x,current.y+1)) current.y++;
      else lock();
    }
  }
  if (started) render();
}
requestAnimationFrame(loop);

document.getElementById('overlay-btn').addEventListener('click', startGame);
document.getElementById('btn-start').addEventListener('click', startGame);
</script>
</body>
